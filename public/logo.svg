<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&amp;family=Outfit:wght@500&amp;display=swap');
      .title { font-family: 'Permanent Marker', cursive; fill: white; font-size: 32px; letter-spacing: 2px; }
      .subtitle { font-family: 'Outfit', sans-serif; fill: white; font-size: 24px; letter-spacing: 2px; text-anchor: middle; }
    </style>
    <path id="curveTop" d="M 130 160 Q 250 140 370 160" fill="transparent" />
    <path id="curveBottom" d="M 160 330 Q 250 350 340 330" fill="transparent" />
  </defs>

  <!-- Bats -->
  <g fill="#FACC15">
    <!-- Bat 1: Top-Left to Bottom-Right -->
    <g transform="rotate(-45 250 250)">
      <!-- Blade -->
      <rect x="215" y="40" width="70" height="240" rx="15" />
      <!-- Handle -->
      <rect x="235" y="280" width="30" height="140" />
      <!-- Grip -->
      <rect x="230" y="420" width="40" height="15" rx="5" />
    </g>
    <!-- Bat 2: Top-Right to Bottom-Left -->
    <g transform="rotate(45 250 250)">
      <!-- Blade -->
      <rect x="215" y="40" width="70" height="240" rx="15" />
      <!-- Handle -->
      <rect x="235" y="280" width="30" height="140" />
      <!-- Grip -->
      <rect x="230" y="420" width="40" height="15" rx="5" />
    </g>
  </g>

  <!-- Shield -->
  <path d="M 140 160 L 250 140 L 360 160 L 360 280 C 360 360 250 420 250 420 C 250 420 140 360 140 280 Z" fill="#2563EB" />

  <!-- Stumps -->
  <g stroke="#F97316" stroke-width="6" stroke-linecap="round" fill="none">
    <!-- Base line -->
    <line x1="180" y1="300" x2="280" y2="300" />
    
    <!-- Left stump -->
    <rect x="190" y="190" width="12" height="110" rx="6" />
    <!-- Middle stump -->
    <rect x="220" y="190" width="12" height="110" rx="6" />
    
    <!-- Right stump (tilted) -->
    <g transform="rotate(15 250 300)">
      <rect x="250" y="190" width="12" height="110" rx="6" />
    </g>
    
    <!-- Flying bails -->
    <rect x="190" y="160" width="30" height="8" rx="4" transform="rotate(-15 205 164)" />
    <rect x="240" y="150" width="30" height="8" rx="4" transform="rotate(25 255 154)" />
  </g>

  <!-- Text inside shield -->
  <text class="title" text-anchor="middle">
    <textPath href="#curveTop" startOffset="50%">MASTERMIND</textPath>
  </text>
  <text class="title" text-anchor="middle">
    <textPath href="#curveBottom" startOffset="50%">SPORTS</textPath>
  </text>

  <!-- Text outside shield -->
  <text x="80" y="260" class="subtitle">We</text>
  <text x="420" y="260" class="subtitle">Make</text>
  <text x="250" y="460" class="subtitle">Champions</text>
</svg>
